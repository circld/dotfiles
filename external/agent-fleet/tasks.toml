# ~/.config/agent-fleet/tasks.toml
# Maps an agent's identity -> logical task name for board grouping.
# Preferred key: the agent's absolute cwd (stable across worktrees, matches .cwd).
# Fallback key: bare repo basename (convenient for non-worktree repos).
# Anything unmatched falls into the "Standalone" bucket.

[repos]
# by absolute cwd (works for worktrees, where basename != repo):
"/Users/paul.garaud/work/octane" = "feature-x"
"/Users/paul.garaud/dotfiles/.worktrees/feature-x" = "feature-x"
# by bare repo basename (fine when the cwd basename IS the repo):
octane-ui = "feature-x"
